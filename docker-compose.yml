services:
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     mlflow
      POSTGRES_PASSWORD: mlflow123
      POSTGRES_DB:       mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  mlflow:
    image: mlflow-patched:v2.11.3
    container_name: mlops-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install psycopg2-binary boto3 --quiet &&
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://mlflow:mlflow123@postgres:5432/mlflow \
          --default-artifact-root s3://mlops-log-anomaly-artifacts/mlflow
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - mlops-network

  api:
    image: log-anomaly-api:v1
    container_name: mlops-api
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:   http://mlflow:5000
      MODEL_NAME:            log-anomaly-detector
      MODEL_ALIAS:           production
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION}
      no_proxy:              localhost,127.0.0.1,mlflow,amazonaws.com
      NO_PROXY:              localhost,127.0.0.1,mlflow,amazonaws.com
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network

volumes:
  postgres_data:

networks:
  mlops-network:
    driver: bridge